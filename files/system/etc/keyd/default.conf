[main]
# Turns physical Caps Lock into your left Windows/Super key
capslock = leftmeta

# Tap physical Start button → Menu; hold activates built-in leftmeta modifier layer
leftmeta = overload(leftmeta, menu)

[leftmeta]
# Copilot key sends leftmeta + leftshift(non-standard scancode) + f23
# Suppress the shift so it doesn't leak through, map f23 to escape
leftshift = noop
f23 = esc

[alt]
space = enter
