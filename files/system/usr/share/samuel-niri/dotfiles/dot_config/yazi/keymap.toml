[mgr]
prepend_keymap = [
{ on = "<C-f>", run = "plugin fzf-nav", desc = "Fuzzy jump (fzf)" },
	{ on = "<C-g>", run = "plugin fazif folder_search", desc = "Fuzzy jump to directory (fzf)" },
	{ on = "<C-h>", run = "search rg", desc = "Search by content (ripgrep)" },
	{ on = "<C-s>", run = "search fd", desc = "Search by name (fd)" },
	{ on = "<C-n>", run = "create", desc = "Create file/folder" },
	{ on = "<C-t>", run = "tab_create --current", desc = "New tab" },
	{ on = "<C-r>", run = "reload", desc = "Reload" },
	{ on = "<C-e>", run = "rename", desc = "Rename" },
	{ on = "r", run = "noop", desc = "Disabled (use Ctrl+E)" },
	{ on = "R", run = "noop", desc = "Disabled (use Ctrl+R)" },
	{ on = "<A-1>", run = "tab_switch 0", desc = "Switch to tab 1" },
	{ on = "<A-2>", run = "tab_switch 1", desc = "Switch to tab 2" },
	{ on = "<A-3>", run = "tab_switch 2", desc = "Switch to tab 3" },
	{ on = "<A-4>", run = "tab_switch 3", desc = "Switch to tab 4" },
	{ on = "<A-5>", run = "tab_switch 4", desc = "Switch to tab 5" },
	{ on = "<A-6>", run = "tab_switch 5", desc = "Switch to tab 6" },
	{ on = "<A-7>", run = "tab_switch 6", desc = "Switch to tab 7" },
	{ on = "<A-8>", run = "tab_switch 7", desc = "Switch to tab 8" },
	{ on = "<A-9>", run = "tab_switch 8", desc = "Switch to tab 9" },
	{ on = "1", run = "noop" },
	{ on = "2", run = "noop" },
	{ on = "3", run = "noop" },
	{ on = "4", run = "noop" },
	{ on = "5", run = "noop" },
	{ on = "6", run = "noop" },
	{ on = "7", run = "noop" },
	{ on = "8", run = "noop" },
	{ on = "9", run = "noop" },
	{ on = "f", run = "noop", desc = "Disabled (use Ctrl+F)" },
	{ on = "<C-j>", run = "filter", desc = "Filter files" },
	{ on = "<C-k>", run = "plugin zoxide", desc = "Jump via zoxide" },
	{ on = "z", run = "noop" },
	{ on = "Z", run = "noop" },
	{ on = "s", run = "noop" },
	{ on = "S", run = "noop" },
	{ on = "!", run = "noop" },
	{ on = "$", run = "noop" },
	{ on = "a", run = "noop" },
	{ on = "t", run = "noop" },
	{ on = "/", run = "noop" },
	{ on = "<C-.>", run = "hidden toggle", desc = "Toggle hidden files" },
	{ on = ".", run = "noop" },
	{ on = "<A-w>", run = "arrow -1", desc = "Move cursor up" },
	{ on = "<A-s>", run = "arrow 1", desc = "Move cursor down" },
	{ on = "<A-a>", run = "leave", desc = "Go to parent directory" },
	{ on = "<A-d>", run = "enter", desc = "Enter directory / open file" },
	{ on = "<Enter>", run = "plugin float-open", desc = "Enter directory / open file (auto-close in float mode)" },
	{ on = "<A-o>", run = "tasks:show", desc = "Open task manager" },
	{ on = "w", run = "noop" },
	{ on = "o", run = "noop" },
	{ on = "O", run = "noop" },
	{ on = "P", run = "noop" },
	{ on = "h", run = "noop" },
	{ on = "j", run = "noop" },
	{ on = "k", run = "noop" },
	{ on = "l", run = "noop" },
	{ on = "H", run = "noop" },
	{ on = "L", run = "noop" },
	{ on = "g", run = "noop" },
	{ on = "G", run = "noop" },
	{ on = "[", run = "noop" },
	{ on = "]", run = "noop" },
	{ on = "{", run = "noop" },
	{ on = "}", run = "noop" },
	{ on = ";", run = "noop" },
	{ on = ":", run = "noop" },
	{ on = "q", run = "noop" },
	{ on = "<C-Delete>", run = "remove", desc = "Trash file" },
	{ on = "<C-S-Delete>", run = "remove", desc = "Trash file" },
	{ on = "d", run = "noop" },
	{ on = "D", run = "noop" },
	{ on = "<C-S-v>", run = "paste", desc = "Paste" },
	{ on = "<C-p>", run = "visual_mode", desc = "Visual mode" },
	{ on = "<C-S-c>", run = "yank", desc = "Yank (copy)" },
	{ on = "<C-S-p>", run = "copy path", desc = "Copy path to clipboard" },
	{ on = "<C-S-x>", run = "yank --cut", desc = "Yank (cut)" },
	{ on = "<C-Escape>", run = "unyank", desc = "Cancel cut/yank" },
	{ on = "p", run = "noop" },
	{ on = "v", run = "noop" },
	{ on = "y", run = "noop" },
	{ on = "x", run = "noop" },
]
