# Inject Homebrew into PATH for all user session processes.
# environment.d files are loaded by systemd's environment generator before any
# user services start — this ensures apps launched from Niri (which go through
# systemd transient scopes) inherit Homebrew even though .zshenv runs too late.
PATH=/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin
