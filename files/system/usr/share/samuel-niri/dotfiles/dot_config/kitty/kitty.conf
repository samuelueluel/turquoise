# --- Environment ---
env FZF_DEFAULT_OPTS=--bind alt-w:up,alt-s:down,alt-a:backward-char,alt-d:forward-char

# --- Behavior ---
confirm_os_window_close 0

# --- Appearance ---
hide_window_decorations yes
tab_bar_style hidden
window_padding_width 10

# --- Font ---
font_size        12.0
font_family      family="JetBrainsMono Nerd Font" style="Bold"
bold_font        auto
italic_font      auto
bold_italic_font auto

# --- Noctalia Colors ---
background            #914059
foreground            #000000
cursor                #00B6C2
cursor_text_color     #000000
selection_background  #00B6C2
selection_foreground  #000000

color0  #000000
color1  #FFA726
color2  #17C182
color3  #D0A7AF
color4  #00B6C2
color5  #B1B9F9
color6  #00B6C2
color7  #D0A7AF
color8  #D0A7AF
color9  #FFA726
color10 #17C182
color11 #D0A7AF
color12 #00B6C2
color13 #B1B9F9
color14 #00B6C2
color15 #D0A7AF

# --- Kitty no-ops (pass through to Yazi) ---
map ctrl+shift+c no_op
map ctrl+shift+v no_op
map ctrl+shift+p no_op
map ctrl+shift+x no_op
map ctrl+x no_op
map ctrl+g no_op
map ctrl+f no_op
map ctrl+s no_op
map ctrl+n no_op
map ctrl+t no_op
map ctrl+r no_op
map ctrl+e no_op
map ctrl+period no_op
map ctrl+h no_op
map ctrl+j no_op
map ctrl+i no_op
map ctrl+delete no_op
map ctrl+shift+delete no_op
map ctrl+p no_op
map ctrl+o no_op
map alt+1 no_op
map alt+2 no_op
map alt+3 no_op
map alt+4 no_op
map alt+5 no_op
map alt+6 no_op
map alt+7 no_op
map alt+8 no_op
map alt+9 no_op

# --- Pass-through keybinds (for Yazi input fields) ---
map ctrl+q send_text all \x1b\x7f
map ctrl+w send_text all \x7f
map alt+q send_text all \x02
map alt+e send_text all \x06
