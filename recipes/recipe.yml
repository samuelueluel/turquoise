name: samuel-niri
description: Minimal Niri Wayland Fedora Atomic image for work laptop
base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:

  # ── Bake system-level config files ────────────────────────────────────────
  # Placed first so repo files (e.g. dropbox.repo) are in place before dnf runs.
  # - /etc/yum.repos.d/dropbox.repo: avoids fetching from linux.dropbox.com in CI
  # - Portal routing: FileChooser→termfilechooser, ScreenCast/Screenshot→gnome
  # - Default cursor theme pointer
  - type: files
    files:
      - source: system
        destination: /

  # ── Remove conflicting base-image packages ────────────────────────────────
  - type: dnf
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # ── Swap glibc-all-langpacks → glibc-langpack-en ─────────────────────────
  # In Fedora 43, glibc requires glibc-langpack at all times. The dnf module
  # runs removes before installs, so install+remove in one block fails.
  # Solution: two separate blocks — install the replacement first, then remove.
  # glibc-all-langpacks: 226MB for 100+ locales; replace with English-only.
  - type: dnf
    install:
      packages:
        - glibc-langpack-en

  - type: dnf
    remove:
      packages:
        - glibc-all-langpacks

  # ── Remove base-image bloat ────────────────────────────────────────────────
  # python3-botocore: AWS SDK (~109MB), no reverse deps, no use on this system
  # geolite2-*: MaxMind GeoIP databases pulled in by base, not required by anything
  # ibus + sub-packages: CJK/multilingual input framework (~200MB+); display of
  #   Japanese/CJK characters is handled by Noto fonts, not ibus
  # cldr-emoji-annotation: Unicode CLDR data only needed by ibus-typing-booster
  # anthy-unicode, libpinyin*, libhangul: CJK input data, only used by ibus
  # orca + speech-dispatcher*: screen reader + TTS stack, nothing depends on them
  # braille-printer-app: Braille printer support, not needed
  # hplip*: HP-specific printer drivers, no HP printer on this system
  # gutenprint*: Epson/Canon printer drivers; Brother network printer uses IPP
  - type: dnf
    remove:
      packages:
        - python3-botocore
        - geolite2-city
        - geolite2-country
        - ibus
        - ibus-anthy
        - ibus-anthy-python
        - ibus-chewing
        - ibus-gtk3
        - ibus-gtk4
        - ibus-hangul
        - ibus-libpinyin
        - ibus-m17n
        - ibus-panel
        - ibus-setup
        - ibus-typing-booster
        - cldr-emoji-annotation
        - cldr-emoji-annotation-dtd
        - anthy-unicode
        - libpinyin
        - libpinyin-data
        - libhangul
        - orca
        - speech-dispatcher
        - speech-dispatcher-espeak-ng
        - speech-dispatcher-libs
        - speech-dispatcher-utils
        - python3-speechd
        - braille-printer-app
        - hplip
        - hplip-common
        - hplip-libs
        - gutenprint
        - gutenprint-cups
        - gutenprint-libs

  # ── RPM Fusion nonfree + tainted ─────────────────────────────────────────
  # base-main pre-configures RPM Fusion free; we add nonfree for codecs.
  # rpmfusion-nonfree-release-tainted enables the tainted subrepo (libdvdcss).
  - type: dnf
    repos:
      nonfree: rpmfusion
    install:
      install-weak-deps: false
      packages:
        - rpmfusion-free-release-tainted   # enables free-tainted subrepo (libdvdcss is here)

  # ── COPR + external repos, plus their packages ────────────────────────────
  - type: dnf
    repos:
      copr:
        - yalter/niri            # niri compositor
        - che/zed                # Zed editor
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
        # dropbox.repo is baked in via the files module (avoids CI network block)
    install:
      install-weak-deps: false
      packages:
        - niri
        - zed
        - dropbox

  # ── Wayland compositor stack ──────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - waybar
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-gnome  # screencasting — Niri uses Smithay, not wlroots
        - xwayland-satellite
        - swaylock
        - swayidle
        - swaybg
        - fuzzel
        - SwayNotificationCenter
        - wlsunset
        - kanshi
        - grim
        - slurp
        # - wl-clipboard          # already in base-main
        - polkit-kde
        - xdg-user-dirs
        - xdg-utils
        - gtk4-layer-shell
        - network-manager-applet
        # hyprpicker: not in Fedora repos — add via script if needed
        - libappindicator-gtk3
        - copyq
        - nirius                 # Niri IPC scripting tool, from Terra
        - jq                     # JSON parsing for Waybar/Niri IPC scripts
        - socat                  # IPC socket listener for Niri event-driven Waybar updates
        - pamixer                # CLI volume control for Waybar scroll/click actions
        - swayosd                # OSD popups for volume/brightness/capslock changes
        # dex: not in Fedora repos — XDG Autostart launcher, add via script if needed

  # ── Display manager ───────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - greetd
        - gtkgreet
        - cage

  # ── Terminals + shell ─────────────────────────────────────────────────────
  # Note: powerlevel10k and fzf-tab managed via dotfiles
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - alacritty
        - kitty
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - bash-completion
        # - fzf                   # already in base-main
        - zoxide
        - nano
        # nano-syntax-highlighting: not in Fedora repos
        - less

  # ── File management ───────────────────────────────────────────────────────
  # yazi installed via script (not in Fedora repos)
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - nemo
        # resvg: not in Fedora repos — yazi SVG previews unavailable without it
        - udiskie
        - trash-cli
        - unrar
        - unzip
        - p7zip
        - gvfs-mtp
        - gvfs-gphoto2
        - gvfs-smb
        - gvfs-nfs
        - gvfs-fuse
        - gvfs-archive
        - ntfs-3g
        - exfatprogs
        - dosfstools
        - nfs-utils
        - xfsprogs                # XFS filesystem tools

  # ── Audio ─────────────────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - pipewire-alsa
        - pipewire-jack-audio-connection-kit  # JACK compat (Fedora name for pipewire-jack)
        - pipewire-pulse
        - wireplumber
        - rtkit
        - alsa-firmware
        - alsa-utils
        - alsa-sof-firmware       # Sound Open Firmware (Fedora name for sof-firmware)
        - pipewire-gstreamer
        - lsp-plugins-lv2        # LV2 audio plugins for host JACK apps

  # ── Hardware + power ──────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - brightnessctl
        - bluez
        - blueman
        - bluez-tools
        - upower
        - power-profiles-daemon
        - fwupd
        - fprintd                  # fingerprint daemon
        - fprintd-pam              # provides pam_fprintd.so; satisfies PAM fingerprint stack
        - keyd
        - playerctl
        - ModemManager
        - mesa-vulkan-drivers     # includes AMD Radeon Vulkan (ThinkPad P14s)
        # - mesa-va-drivers       # already in base-main (ublue upgrades it)
        # - libva-utils           # already in base-main
        - mesa-demos              # glxinfo, eglinfo etc.
        - thermald                # thermal management

  # ── Networking infrastructure ──────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - NetworkManager-openvpn
        - NetworkManager-openconnect
        - NetworkManager-openvpn-gnome
        - NetworkManager-openconnect-gnome
        - avahi
        - nss-mdns
        - dnsmasq                 # used by libvirt for VM networking
        - openssh
        - wget
        - wireless-regdb
        - firewall-config
        - firewall-applet

  # ── Printing ──────────────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - cups
        - cups-browsed

  # ── Media ─────────────────────────────────────────────────────────────────
  # mpv stays in base (needed by yazi for video previews)
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - mpv
        - swayimg                 # Wayland image viewer
        - yt-dlp
        # - ffmpeg                # already in base-main
        - gstreamer1-plugin-libav
        - gstreamer1-vaapi
        - gstreamer1-plugins-good
        - gstreamer1-plugins-bad-free
        - gstreamer1-plugins-ugly
        - libdvdcss               # from RPM Fusion nonfree-tainted
        - libopenraw
        - libgsf
        - poppler-glib

  # ── System utilities ───────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - git
        # - rsync                 # already in base-main
        - fd-find
        - ripgrep
        - chezmoi                 # dotfile manager (replaces stow for this image)
        # - smartmontools         # already in base-main
        # - usbutils              # already in base-main
        - inxi
        # - dmidecode             # already in base-main
        - hdparm
        - sg3_utils
        - lsscsi
        - sysfsutils
        # - whois                 # already in base-main
        # - ethtool               # already in base-main
        # - bind-utils            # already in base-main
        # - iputils               # already in base-main
        # - hostname              # already in base-main
        - inotify-tools
        - plocate
        - fastfetch
        - duf
        - glances
        - tldr
        # - man-db                # already in base-main
        - hwinfo
        # gnome-keyring (from base-main) handles org.freedesktop.secrets for Vivaldi/Chromium
        # kf6-kwallet / kf6-kwallet-pam: removed — no PAM auto-unlock in Fedora 43 and gnome-keyring covers the use case
        # - python3               # already in base-main
        # - python3-evdev         # already in base-main
        - nodejs                  # required for Gemini CLI and Claude Code
        - nodejs-npm              # required for Gemini CLI installation
        # - os-prober             # already in base-main
        # - cosign                # already in base-main

  # ── Themes + appearance ────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - papirus-icon-theme
        - adw-gtk3-theme
        - qt6ct
        - qt5ct
        - qt6-qtwayland

  # ── Fonts ─────────────────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - freetype-freeworld      # subpixel hinting + LCD filtering (better than stock Fedora FreeType)
        - ibm-plex-sans-fonts     # full family: Light, Regular, SemiBold, Bold, etc.
        - ibm-plex-mono-fonts
        - google-noto-emoji-fonts
        - google-noto-sans-fonts
        - google-noto-serif-fonts
        - google-noto-sans-cjk-fonts
        - fontawesome-fonts-all
        - liberation-fonts

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono           # full family direct from Nerd Fonts releases

  # ── Virtualization ────────────────────────────────────────────────────────
  - type: dnf
    group-install:
      packages:
        - virtualization
    install:
      install-weak-deps: false
      packages:
        - virt-manager

  # ── Web Browsers ──────────────────────────────────────────────────────────
  - type: dnf
    repos:
      files:
        - https://repo.vivaldi.com/archive/vivaldi-fedora.repo
    install:
      install-weak-deps: false
      packages:
        - vivaldi-stable

  - type: script
    scripts:
      - update-vivaldi-ffmpeg.sh

  # ── Flatpaks ──────────────────────────────────────────────────────────────
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        repo:
          title: Flathub
          url: https://dl.flathub.org/repo/flathub.flatpakrepo
        install:
          # Browsers
          - io.gitlab.librewolf-community
          # Productivity
          - md.obsidian.Obsidian
          - com.bitwarden.desktop
          - org.kde.okular
          - com.github.jeromerobert.pdfarranger
          - org.gnumeric.Gnumeric
          - org.gnome.meld
          - com.abisource.AbiWord          # for opening Word files
          - org.texstudio.TeXstudio        # bundles TeXLive
          # Audio/media
          - com.github.wwmm.easyeffects
          - org.pulseaudio.pavucontrol
          - io.github.quodlibet.QuodLibet
          # Work/GIS
          - org.qgis.qgis//stable
          # Entertainment
          - org.nicotine_plus.Nicotine     # NOTE: archived on Flathub, may stop receiving updates
          - com.stremio.Stremio
          # System
          - io.missioncenter.MissionCenter
          - io.github.dvlv.boxbuddyrs
        remove:
          - org.mozilla.firefox
          - org.mozilla.Thunderbird
          - org.kde.gwenview
          - org.kde.haruna
          - org.kde.kcalc
          - org.kde.kclock
          - org.kde.kontact
          - org.kde.kweather
          - org.kde.skanpage

  # ── Claude Code ──────────────────────────────────────────────────────────
  # Official curl installer; script relocates binary from /usr/local/bin to
  # /usr/bin/ so it survives ostree deployment (local/ is a runtime overlay).
  - type: script
    scripts:
      - install-claude-code.sh

  # ── Gemini CLI ────────────────────────────────────────────────────────────
  # npm install with --prefix /usr puts the binary in /usr/bin/ directly.
  - type: script
    scripts:
      - install-gemini-cli.sh

  # ── Build patched niri_window_buttons waybar module ──────────────────────
  # Patch centers icon in highlight box when show_window_titles=false.
  # Not packaged for Fedora; built from source (Rust).
  - type: script
    scripts:
      - build-niri-window-buttons.sh

  # ── Build nwg-look from source ────────────────────────────────────────────
  # dustee071/unstable-apps COPR does not publish Fedora 43 builds
  - type: script
    scripts:
      - install-nwg-look.sh

  # ── Install yazi binary ────────────────────────────────────────────────────
  # Not in Fedora repos; download pre-built musl binary from GitHub releases
  - type: script
    scripts:
      - install-yazi.sh

  # ── Build xdg-desktop-portal-termfilechooser ──────────────────────────────
  # Yazi file picker portal; not packaged for Fedora, built from source (Rust)
  - type: script
    scripts:
      - build-termfilechooser.sh

  # ── Install Oreo cursors ───────────────────────────────────────────────────
  - type: script
    scripts:
      - install-oreo-cursors.sh

  # ── Install Microsoft core fonts (Arial, Times New Roman, etc.) ──────────
  # Not packaged for Fedora; downloaded from SourceForge via cabextract
  - type: script
    scripts:
      - install-msfonts.sh

  # ── Configure greetd + gtkgreet ───────────────────────────────────────────
  - type: script
    scripts:
      - setup-greetd.sh

  # ── Custom SELinux policy ─────────────────────────────────────────────────
  # Allow xdm_t (greetd) to start/status systemd unit files.
  # Needed if niri-session triggers systemctl --user under the xdm_t context.
  - type: script
    scripts:
      - setup-selinux.sh

  # ── Systemd services ──────────────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - greetd.service
        - bluetooth.service
        - libvirtd.service
        - keyd.service
        - power-profiles-daemon.service
        - thermald.service
        - avahi-daemon.service
        - cups.service
        - fstrim.timer
      disabled:
        - gdm.service
        - sddm.service
    user:
      enabled:
        # dropbox.service: Dropbox RPM doesn't ship a systemd unit; use XDG autostart instead
        - pipewire.service
        - pipewire-pulse.service
        - wireplumber.service
