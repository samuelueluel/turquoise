name: turquoise
description: Fedora Atomic image with niri
base-image: ghcr.io/ublue-os/base-main # This will change in the future
image-version: latest

# To list all packages in the base-main, run:
# podman run --rm -it ghcr.io/ublue-os/base-main:latest rpm -qa

# Module list lives in turquoise-common.yml so it can be shared with
# turquoise-halo.yml (HP ZBook Ultra G1a). This file is just the turquoise
# header + the shared include — editing modules means editing turquoise-common.yml.
modules:
  - from-file: turquoise-common.yml
