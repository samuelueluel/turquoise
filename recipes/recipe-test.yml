name: samuel-niri-test
description: Fedora Bootc image with niri (TEST RECIPE)
base-image: quay.io/fedora/fedora-bootc
image-version: latest

# To list all packages in the base image, run:
# podman run --rm -it quay.io/fedora/fedora-bootc:latest rpm -qa

modules:
  # ── Bake system-level config files ────────────────────────────────────────
  # Placed first so repo files (e.g. dropbox.repo) are in place before dnf runs.
  # - /etc/yum.repos.d/dropbox.repo: avoids fetching from linux.dropbox.com in CI
  # - Portal routing: FileChooser→termfilechooser, ScreenCast/Screenshot→gnome
  # - Default cursor theme pointer
  - type: files
    files:
      - source: system
        destination: /

  # ── RPM Fusion Setup ──────────────────────────────────────────────────────
  # fedora-bootc lacks RPM Fusion. We install the release packages directly.
  - type: dnf
    install:
      packages:
        - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm
        - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm

  # ── Swap glibc-all-langpacks → glibc-langpack-en ─────────────────────────
  # In Fedora 43 (44?), glibc requires glibc-langpack at all times.
  - type: dnf
    install:
      packages:
        - glibc-langpack-en

  # ── Inject Missing Base Dependencies ──────────────────────────────────────
  # Essential packages identified as missing in fedora-bootc vs ublue-main.
  # Includes hardware-accelerated 'freeworld' codecs from RPM Fusion.
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        # Drivers & Firmware
        - linux-firmware # Base Linux kernel firmware
        - amd-gpu-firmware # AMD Radeon graphics firmware
        - amd-ucode-firmware # AMD Ryzen processor microcode
        - mesa-dri-drivers # Mesa Direct Rendering Infrastructure drivers
        - mesa-vulkan-drivers # Vulkan drivers for AMD/Intel graphics
        - mesa-libgbm # Generic Buffer Management for Wayland compositors
        - mesa-libEGL # EGL API library for Wayland hardware acceleration
        - mesa-libGL # OpenGL API library
        - mesa-va-drivers-freeworld # Hardware video acceleration (VA-API) for AMD from RPM Fusion
        - libva # VA-API core library
        - libva-utils # VA-API diagnostic tools (vainfo)
        - libvdpau # VDPAU core library
        - vdpauinfo # VDPAU diagnostic tools
        - alsa-sof-firmware # Sound Open Firmware for modern audio chipsets
        - alsa-firmware # Standard ALSA audio firmware
        - iwlwifi-mvm-firmware # Intel wireless firmware (MVM)
        - iwlwifi-dvm-firmware # Intel wireless firmware (DVM)
        # Audio Stack
        - pipewire # Modern Linux audio/video server
        - wireplumber # Session/policy manager for PipeWire
        - pipewire-pulseaudio # PulseAudio compatibility layer for PipeWire
        - pipewire-alsa # ALSA compatibility layer for PipeWire
        - pipewire-jack-audio-connection-kit # JACK compatibility layer for PipeWire
        - alsa-utils # Command-line ALSA utilities (alsamixer, etc.)
        # Display & Portals
        - libwayland-client # Wayland client library
        - libwayland-cursor # Wayland cursor library
        - libwayland-egl # Wayland EGL library
        - xorg-x11-server-Xwayland # X11 compatibility layer for Wayland
        - xdg-desktop-portal # Core XDG desktop portal service (screensharing, file picking)
        - xdg-desktop-portal-gtk # GTK backend for XDG desktop portals
        - xdg-utils # Desktop integration utilities (xdg-open, etc.)
        # Multimedia Codecs
        - gstreamer1-plugins-bad-freeworld # GStreamer plugins (bad) including full hardware codecs
        - gstreamer1-plugins-ugly # GStreamer plugins (ugly) including MP3/DVD
        - libavcodec-freeworld # FFmpeg full codec library from RPM Fusion
        # Networking
        - NetworkManager-wifi # WiFi support for NetworkManager
        - NetworkManager-bluetooth # Bluetooth PAN support for NetworkManager
        # Base Utils
        - git-core # Core Git version control tools
        - rsync # File synchronization tool
        - bash-completion # Autocompletion for bash/system utilities
        - wget2 # Command-line file downloader

  # ── Stable kernel (kernel-vanilla/stable) ────────────────────────────────
  # Replaces the base kernel with latest upstream stable release.
  # Uses replace (distro-sync) so the COPR version wins even if base image
  # already has the same or older version installed.
  # Secure Boot validation must be disabled in BIOS (verified disabled).
  - type: dnf
    repos:
      copr:
        - "@kernel-vanilla/stable"
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:group_kernel-vanilla:stable
        packages:
          - kernel
          - kernel-core
          - kernel-modules
          - kernel-modules-extra

  # ── COPR + external repos, plus their packages ────────────────────────────
  - type: dnf
    repos:
      copr:
        - yalter/niri # niri compositor
        - ublue-os/packages # uupd unified updater (maintained by uBlue project)
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
        # dropbox.repo is baked in via the files module (avoids CI network block)
    install:
      install-weak-deps: false
      packages:
        - niri
        - dropbox
        - uupd
        - swww
        - python3-waypaper

  # ── Wayland compositor stack ──────────────────────────────────────────────
  # swayosd: COPR has no Fedora 44 builds; built from source via build-swayosd.sh
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - wdisplays # GUI for managing Wayland displays
        - waybar # Status bar for Wayland
        - wf-recorder # Wayland screen recorder
        - xdg-desktop-portal-gtk # GTK backend for XDG desktop portals
        - xdg-desktop-portal-gnome # screencasting — Niri uses Smithay, not wlroots
        - xwayland-satellite # Xwayland manager outside of wlroots
        - swaylock # Screen locker for Wayland
        - swayidle # Idle management daemon for Wayland
        - SwayNotificationCenter # Notification daemon
        - wlsunset # Day/night gamma adjustments for Wayland
        - kanshi # Dynamic display configuration
        - grim # Screen image grabber for Wayland
        - slurp # Select a region in a Wayland compositor
        - wl-clipboard # Command-line copy/paste utilities for Wayland
        - polkit-kde # GUI polkit authentication agent
        - xdg-user-dirs # Tool to help manage user directories
        - xdg-utils # Desktop integration utilities
        - gtk4-layer-shell # Layer shell for GTK4 (used by some wayland tools)
        - network-manager-applet # NetworkManager system tray applet
        # hyprpicker: not in Fedora repos — add via script if needed
        - libappindicator-gtk3 # Allow apps to show icons in system tray
        # nirius: built from source via build-nirius.sh (Terra is behind upstream)
        - jq # JSON parsing for Waybar/Niri IPC scripts
        - socat # IPC socket listener for Niri event-driven Waybar updates
        - pamixer # CLI volume control for Waybar scroll/click actions
        # swayosd: built from source via build-swayosd.sh
        # dex: not in Fedora repos — XDG Autostart launcher, add via script if needed

  # ── Display manager ───────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - greetd # Minimal and flexible login manager daemon
        - gtkgreet # GTK based greeter for greetd
        - cage # Wayland kiosk compositor (runs gtkgreet)

  # ── Terminals + shell ─────────────────────────────────────────────────────
  # Note: starship and fzf-tab managed via dotfiles; most CLI stuff in Brewfile
  - type: dnf
    repos:
      copr:
        - scottames/ghostty
    install:
      install-weak-deps: false
      packages:
        - ghostty # GPU-accelerated terminal emulator

  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - kitty # Fast, feature-rich, GPU-based terminal
        - zsh # Z shell
        - zsh-autosuggestions # Fish-like autosuggestions for zsh
        - zsh-syntax-highlighting # Fish shell like syntax highlighting for zsh
        - bash-completion # Programmable completion for bash/zsh
        - fzf # Command-line fuzzy finder
        # zoxide → homebrew: zoxide
        - nano # Simple text editor
        # nano-syntax-highlighting: not in Fedora repos
        - less # Terminal pager

  # ── File management ───────────────────────────────────────────────────────
  # yazi installed via script (not in Fedora repos)
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - nemo
        # resvg: not in Fedora repos — yazi SVG previews unavailable without it
        - udiskie
        - trash-cli
        - unrar
        - unzip
        - p7zip
        - gvfs-mtp
        - gvfs-gphoto2
        - gvfs-smb
        - gvfs-nfs
        - gvfs-fuse
        - gvfs-archive
        - ntfs-3g
        - exfatprogs
        - dosfstools
        - nfs-utils
        - xfsprogs # XFS filesystem tools
        - xfsprogs-xfs_scrub # online XFS metadata scrubber + systemd units

  # ── Audio ─────────────────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - pipewire-alsa
        - pipewire-jack-audio-connection-kit # JACK compat (Fedora name for pipewire-jack)
        - pipewire-pulse
        - wireplumber
        - rtkit
        - alsa-firmware
        - alsa-utils
        - alsa-sof-firmware # Sound Open Firmware (Fedora name for sof-firmware)
        - pipewire-gstreamer
        - lsp-plugins-lv2 # LV2 audio plugins for host JACK apps
        - wiremix # TUI mixer for PipeWire

  # ── Hardware + power ──────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - brightnessctl # Read and control device brightness
        - bluez # Bluetooth protocol stack
        - blueman # GTK+ Bluetooth manager
        - bluez-tools # Command line Bluetooth utilities
        - upower # Power management service
        - power-profiles-daemon # Handles system power profiles
        - fwupd # Firmware update daemon
        - fprintd # fingerprint daemon
        - fprintd-pam # provides pam_fprintd.so; satisfies PAM fingerprint stack
        # keyd: not in Fedora repos; built from source via build-keyd.sh
        - playerctl # Command-line controller for media players
        - ModemManager # Mobile broadband modem management service
        - mesa-vulkan-drivers # includes AMD Radeon Vulkan (ThinkPad P14s)
        # - mesa-va-drivers
        # - libva-utils
        - mesa-demos # glxinfo, eglinfo etc.
        - thermald # thermal management

  # ── Networking infrastructure ──────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - NetworkManager-tui # Text user interface for NetworkManager
        - NetworkManager-openvpn # OpenVPN plugin for NetworkManager
        - NetworkManager-openconnect # OpenConnect plugin for NetworkManager
        - NetworkManager-openvpn-gnome # OpenVPN integration for GNOME/GTK
        - NetworkManager-openconnect-gnome # OpenConnect integration for GNOME/GTK
        - avahi # Local network service discovery (mDNS/DNS-SD)
        - nss-mdns # mDNS resolution plugin for glibc
        - dnsmasq # used by libvirt for VM networking
        - openssh # SSH client and server
        - wget # File retriever
        - wireless-regdb # Wireless regulatory database
        - firewall-config # GUI for firewalld
        - firewall-applet # System tray applet for firewalld

  # ── Printing ──────────────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - cups
        - cups-browsed

  # ── Media ─────────────────────────────────────────────────────────────────
  # mpv stays in base (needed by yazi for video previews)
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - mpv
        - mpd # music player daemon (PipeWire-native via Fedora build)
        - mpc # minimalist CLI client for mpd scripting
        - beets # music library manager and tagger
        - beets-plugins # extra beets plugins
        - beets-doc # beets documentation
        - swayimg # Wayland image viewer
        # yt-dlp → homebrew: yt-dlp
        - ffmpeg
        - gstreamer1-plugin-libav
        - gstreamer1-vaapi
        - gstreamer1-plugins-good
        - gstreamer1-plugins-bad-free
        - gstreamer1-plugins-ugly
        - libdvdcss # from RPM Fusion nonfree-tainted
        - libopenraw
        - libgsf
        - poppler-glib

  # ── System utilities ───────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - git # Fast version control system
        - rsync # Remote file synchronization tool
        - fd-find # fallback for yazi search; homebrew fd takes precedence if installed
        - fzf # fallback for yazi search; homebrew fzf takes precedence if installed
        # ripgrep → homebrew: ripgrep
        # bat → homebrew: bat
        # eza → homebrew: eza
        # atuin → homebrew: atuin
        # gh → homebrew: gh
        # television → homebrew: television
        # git-delta → homebrew: git-delta
        # golang-github-jesseduffield-lazygit → homebrew: lazygit
        # du-dust → homebrew: dust
        # yq → homebrew: yq
        # glow → homebrew: glow
        # zoxide → homebrew: zoxide
        - chezmoi # dotfile manager — must be in image to bootstrap dotfiles before brew
        - just # Command runner
        - smartmontools # S.M.A.R.T. disk monitoring tools
        - usbutils # Linux USB utilities
        - inxi # System information script
        - dmidecode # Tool to analyze SMBIOS/DMI data
        - hdparm # Get/set SATA/IDE device parameters
        - sg3_utils # Utilities for devices that use SCSI command sets
        - lsscsi # List SCSI devices (or hosts)
        - sysfsutils # Utilities for querying sysfs
        - whois # Intelligent WHOIS client
        - ethtool # Tool for querying and changing network interface settings
        - bind-utils # DNS utilities
        - iputils # Network monitoring tools
        - hostname # Show or set the system's host name
        - inotify-tools # Command line utilities for inotify
        - plocate # Fast locate implementation
        # fastfetch → homebrew: fastfetch
        # duf → homebrew: duf
        # glances → homebrew: glances
        # tldr → homebrew: tldr
        - man-db # On-line manual database
        - htop # Interactive process viewer
        - hwinfo # Hardware information tool
        # gnome-keyring handles org.freedesktop.secrets for browser password storage
        # kf6-kwallet / kf6-kwallet-pam: removed — no PAM auto-unlock in Fedora 43 and gnome-keyring covers the use case
        - python3 # Python 3 interpreter
        - python3-evdev # Python bindings to Linux input handling subsystem
        - os-prober # Utility to detect other OSes on a set of drives
        # - cosign               # (pinned version from GitHub releases — do not install via dnf)
        # - curl                 # present in base
        # - gcc                  # pulled in by build scripts (nwg-look, niri-window-buttons)
        # - checkpolicy          # used by setup-selinux.sh
        # - policycoreutils      # used by setup-selinux.sh
        - libxcrypt-compat # homebrew dependency that must be on system

  # ── Homebrew Framework ─────────────────────────────────────────────────────
  - type: brew
    brew-analytics: false
    auto-upgrade: false # probably have separate update timer

  # ── themes + appearance ────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - papirus-icon-theme # Comprehensive icon theme
        - papirus-icon-theme-dark # Needed for dark GTK themes
        - adw-gtk3-theme # Adwaita theme for GTK3 applications
        - xapp-symbolic-icons # Fixes broken symbolic icons in Nemo UI
        - qt6ct # Qt6 Configuration Tool
        - qt5ct # Qt5 Configuration Tool
        - qt6-qtwayland # Qt6 Wayland platform plugin
        - kvantum # SVG-based theme engine for Qt

  # ── Fonts ─────────────────────────────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - freetype-freeworld # subpixel hinting + LCD filtering (better than stock Fedora FreeType)
        - ibm-plex-sans-fonts # full family: Light, Regular, SemiBold, Bold, etc.
        - ibm-plex-mono-fonts # Monospace variant of IBM Plex
        - google-noto-emoji-fonts # Standard emoji fonts
        - google-noto-sans-fonts # Standard sans-serif fonts
        - google-noto-serif-fonts # Standard serif fonts
        - google-noto-sans-cjk-fonts # CJK (Chinese, Japanese, Korean) fonts
        - fontawesome-fonts-all # Font Awesome icon font
        - liberation-fonts # Core Liberation fonts (Arial/Times/Courier equivalents)

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono # full family direct from Nerd Fonts releases

  # ── Virtualization ────────────────────────────────────────────────────────
  - type: dnf
    group-install:
      packages:
        - virtualization
    install:
      install-weak-deps: false
      packages:
        - virt-manager # GUI desktop tool for managing virtual machines

  # ── Android (Waydroid) ────────────────────────────────────────────────────
  # Binder is built into the vanilla kernel (CONFIG_ANDROID_BINDER_IPC=y).
  # waydroid-container.service manages the Android container; run
  # `sudo waydroid init` on first boot to download the Android system image.
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - waydroid # Container-based approach to boot a full Android system
        - lzip # needed by waydroid-script (ARM translation + GAPPS installer)

  # ── Flatpaks ──────────────────────────────────────────────────────────────
  - type: default-flatpaks # Configures Flathub repository
    configurations:
      - scope: system
        notify: true
        repo:
          title: Flathub
          url: https://dl.flathub.org/repo/flathub.flatpakrepo

  # ── Install build-time toolchain ─────────────────────────────────────────
  # All build scripts assume these are pre-installed; cleaned up afterwards.
  #   cargo, rust, rust-std-static, binutils, cpp  ← Rust builds (nirius, niri-window-buttons, fsel, swayosd)
  #   gtk3-devel, glib2-devel                      ← niri-window-buttons, nwg-look
  #   meson, ninja-build, gcc                      ← termfilechooser, cclip, swayosd
  #   wayland-devel, sqlite-devel, xxhash-devel    ← cclip
  #   inih-devel, systemd-devel, scdoc             ← termfilechooser
  #   golang + golang-bin/src/go-filesystem, make  ← nwg-look
  #   cabextract                                   ← install-msfonts
  #   policycoreutils-python-utils                 ← setup-selinux (semanage fallback)
  #   gtk4-devel, gtk4-layer-shell-devel, pulseaudio-libs-devel,
  #     libinput-devel, libevdev-devel, sassc      ← swayosd
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - cargo # Rust package manager
        - rust # Rust compiler
        - gtk3-devel # GTK3 development headers
        - glib2-devel # GLib2 development headers
        - gtk4-devel # GTK4 development headers
        - gtk4-layer-shell-devel # GTK4 Layer Shell headers
        - pulseaudio-libs-devel # PulseAudio development headers
        - libinput-devel # libinput development headers
        - libevdev-devel # libevdev development headers
        - sassc # C implementation of Sass compiler
        - meson # Meson build system
        - ninja-build # Ninja build system
        - gcc # GNU Compiler Collection
        - wayland-devel # Wayland development headers
        - sqlite-devel # SQLite development headers
        - xxhash-devel # xxHash development headers
        - inih-devel # inih development headers
        - systemd-devel # systemd development headers
        - scdoc # Man page generator
        - golang # Go programming language
        - make # GNU make utility
        - cabextract # Microsoft cabinet file extractor
        - policycoreutils-python-utils # SELinux policy utilities (semanage)

  # ── Build nirius from source ──────────────────────────────────────────────
  # Terra is behind upstream; build directly from the tagged release tarball.
  - type: script
    scripts:
      - build-nirius.sh

  # ── Build swayosd from source ─────────────────────────────────────────────
  # erikreider/swayosd COPR does not publish Fedora 44 builds.
  - type: script
    scripts:
      - build-swayosd.sh

  # ── Install Zed editor (Official Binary) ─────────────────────────────────
  # Terra RPM (1.0.0) has a wasmtime bug that crashes Zed when opening any file.
  # Official binary from GitHub releases does not have this issue.
  - type: script
    scripts:
      - install-zed.sh

  # ── Install systemd-manager-tui (Official Binary) ────────────────────────
  - type: script
    scripts:
      - install-systemd-manager-tui.sh

  # ── Install Zen Browser (Native Binary) ──────────────────────────────────
  - type: script
    scripts:
      - install-zen-browser.sh

  # ── Install Helium Browser (COPR RPM) ────────────────────────────────────
  - type: dnf
    repos:
      copr:
        - imput/helium
    install:
      install-weak-deps: false
      packages:
        - helium

  # ── Build patched niri_window_buttons waybar module ──────────────────────
  # Patch centers icon in highlight box when show_window_titles=false.
  # Not packaged for Fedora; built from source (Rust).
  - type: script
    scripts:
      - build-niri-window-buttons.sh

  # ── Build nwg-look from source ────────────────────────────────────────────
  # dustee071/unstable-apps COPR does not publish Fedora 43 builds
  - type: script
    scripts:
      - install-nwg-look.sh

  # ── Install yazi binary ────────────────────────────────────────────────────
  # Not in Fedora repos; download pre-built musl binary from GitHub releases
  - type: script
    scripts:
      - install-yazi.sh

  # ── Install rmpc binary ───────────────────────────────────────────────────
  # Not in Fedora repos; download pre-built musl binary from GitHub releases
  - type: script
    scripts:
      - install-rmpc.sh

  # ── Build rmpcd from source ───────────────────────────────────────────────
  # rmpcd is the rmpc companion daemon (MPRIS, Last.fm, lyrics, notifications)
  # Not distributed as a pre-built binary; built from source via cargo
  - type: script
    scripts:
      - build-rmpcd.sh

  # ── Build fsel from source ──────────────────────────────────────────────────
  # Not in Fedora repos; built from source using cargo
  - type: script
    scripts:
      - build-fsel.sh

  # ── Build cclip from source ────────────────────────────────────────────────
  # Not in Fedora repos; built from source using cargo
  - type: script
    scripts:
      - build-cclip.sh

  # ── Build keyd from source ────────────────────────────────────────────────
  # Not in Fedora repos; was in Terra which has recurring GPG issues
  - type: script
    scripts:
      - build-keyd.sh

  # ── Build xdg-desktop-portal-termfilechooser ──────────────────────────────
  # Yazi file picker portal; not packaged for Fedora, built from source (Rust)
  - type: script
    scripts:
      - build-termfilechooser.sh

  # ── Install Oreo cursors ───────────────────────────────────────────────────
  - type: script
    scripts:
      - install-oreo-cursors.sh

  # ── Install Microsoft core fonts (Arial, Times New Roman, etc.) ──────────
  # Not packaged for Fedora; downloaded from SourceForge via cabextract
  - type: script
    scripts:
      - install-msfonts.sh

  # ── Build bluetuith from source ──────────────────────────────────────────
  # Not in Fedora repos or Homebrew; built with Go toolchain.
  - type: script
    scripts:
      - build-bluetuith.sh

  # ── Clone dotfiles snapshot ────────────────────────────────────────────────
  - type: script
    scripts:
      - build-dotfiles.sh

  # ── Remove build-time toolchain ──────────────────────────────────────────
  # Remove everything installed by the pre-build block above, plus transitive
  # deps that dnf pulled in but won't auto-remove:
  #   rust-std-static, binutils, cpp  ← orphaned deps of cargo/rust
  #   golang-bin, golang-src, go-filesystem  ← orphaned deps of golang
  #   wayland-devel, sqlite-devel, xxhash-devel ← orphaned deps of cclip
  - type: dnf
    remove:
      packages:
        - cargo # Remove Rust package manager
        - rust # Remove Rust compiler
        - rust-std-static # Remove Rust standard library
        - binutils # Remove binary utilities
        - cpp # Remove C preprocessor
        - gtk3-devel # Remove GTK3 headers
        - glib2-devel # Remove GLib2 headers
        - gtk4-devel # Remove GTK4 headers
        - gtk4-layer-shell-devel # Remove Layer Shell headers
        - pulseaudio-libs-devel # Remove PulseAudio headers
        - libinput-devel # Remove libinput headers
        - libevdev-devel # Remove libevdev headers
        - sassc # Remove Sass compiler
        - meson # Remove Meson build system
        - ninja-build # Remove Ninja build system
        - gcc # Remove GCC compiler
        - wayland-devel # Remove Wayland headers
        - sqlite-devel # Remove SQLite headers
        - xxhash-devel # Remove xxHash headers
        - inih-devel # Remove inih headers
        - systemd-devel # Remove systemd headers
        - scdoc # Remove scdoc
        - golang # Remove Go programming language
        - golang-bin # Remove Go binaries
        - golang-src # Remove Go source
        - go-filesystem # Remove Go filesystem layout
        - make # Remove GNU make
        - cabextract # Remove cabextract
        - policycoreutils-python-utils # Remove semanage utility

  # ── Configure greetd + gtkgreet ───────────────────────────────────────────
  - type: script
    scripts:
      - setup-greetd.sh

  # ── Custom SELinux policy ─────────────────────────────────────────────────
  # Allow xdm_t (greetd) to start/status systemd unit files.
  # Needed if niri-session triggers systemctl --user under the xdm_t context.
  - type: script
    scripts:
      - setup-selinux.sh
      - hide-duplicate-desktops.sh

  # ── Systemd services ──────────────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - greetd.service
        - bluetooth.service
        - libvirtd.socket
        - waydroid-container.service
        - keyd.service
        - power-profiles-daemon.service
        - thermald.service
        - avahi-daemon.service
        - cups.service
        - fstrim.timer
        - xfs_scrub_all.timer
        - uupd.timer
      disabled:
        # gdm.service and sddm.service removed: not present in base
        - flatpak-system-update.timer
        - brew-update.timer
        - rpm-ostreed-automatic.timer
    user:
      enabled:
        # dropbox.service: Dropbox RPM doesn't ship a systemd unit; use XDG autostart instead
        - app-com.mitchellh.ghostty.service
        - pipewire.service
        - pipewire-pulse.service
        - wireplumber.service
        - mpd.service
        - rmpcd.service
      disabled:
        - flatpak-user-update.timer
